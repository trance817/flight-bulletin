<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>機票布告欄</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            pulse_fast: 'pulse 1s cubic-bezier(0.4,0,0.6,1) infinite',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .tab-active { border-bottom: 2px solid #22d3ee; color: #22d3ee; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- ── Header ── -->
  <header class="border-b border-gray-800 px-6 py-4 flex items-center gap-3">
    <span class="text-2xl">✈</span>
    <div>
      <h1 class="text-lg font-bold tracking-widest text-cyan-400">機票布告欄</h1>
      <p class="text-xs text-gray-500 tracking-wider">FLIGHT BULLETIN BOARD</p>
    </div>
    <div class="ml-auto text-right">
      <p class="text-xs text-gray-600" id="last-updated">—</p>
    </div>
  </header>

  <!-- ── Tabs ── -->
  <nav class="flex border-b border-gray-800 px-6">
    <button onclick="switchTab('BKK')" id="tab-BKK"
      class="tab px-5 py-3 text-sm font-medium text-gray-400 hover:text-cyan-300 transition-colors">
      BKK <span class="text-xs ml-1 text-gray-600">曼谷</span>
    </button>
    <button onclick="switchTab('CTS')" id="tab-CTS"
      class="tab px-5 py-3 text-sm font-medium text-gray-400 hover:text-cyan-300 transition-colors">
      CTS <span class="text-xs ml-1 text-gray-600">札幌</span>
    </button>
    <button onclick="switchTab('KIX')" id="tab-KIX"
      class="tab px-5 py-3 text-sm font-medium text-gray-400 hover:text-cyan-300 transition-colors">
      KIX <span class="text-xs ml-1 text-gray-600">大阪</span>
    </button>
    <button onclick="switchTab('OKA')" id="tab-OKA"
      class="tab px-5 py-3 text-sm font-medium text-gray-400 hover:text-cyan-300 transition-colors">
      OKA <span class="text-xs ml-1 text-gray-600">沖繩</span>
    </button>
  </nav>

  <!-- ── Main ── -->
  <main class="px-6 py-6">
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
  </main>

  <script>
    // ────────────────────────────────────────────
    // ★ 填入你的 Google Sheets 發布 CSV 網址
    // ────────────────────────────────────────────
    const config = {
      BKK: { label: '曼谷', url: 'https://docs.google.com/spreadsheets/d/1Czt87CXX6o2YGodh2u8UiyrqXaGipLYXcLA1XhjgASw/export?format=csv&gid=714534551' },
      CTS: { label: '札幌', url: 'https://docs.google.com/spreadsheets/d/1Czt87CXX6o2YGodh2u8UiyrqXaGipLYXcLA1XhjgASw/export?format=csv&gid=380962829' },
      KIX: { label: '大阪', url: 'https://docs.google.com/spreadsheets/d/1Czt87CXX6o2YGodh2u8UiyrqXaGipLYXcLA1XhjgASw/export?format=csv&gid=1125156812' },
      OKA: { label: '沖繩', url: 'https://docs.google.com/spreadsheets/d/1Czt87CXX6o2YGodh2u8UiyrqXaGipLYXcLA1XhjgASw/export?format=csv&gid=1456748343' },
    };
    // ────────────────────────────────────────────

    let currentTab = 'BKK';

    function seatBadge(n) {
      const num = parseInt(n, 10);
      if (isNaN(num) || n === '' || n == null)
        return `<span class="inline-block px-2 py-0.5 rounded text-xs font-semibold bg-gray-700 text-gray-400">—</span>`;
      if (num <= 0)
        return `<span class="inline-block px-2 py-0.5 rounded text-xs font-semibold bg-gray-700 text-gray-400">售罄</span>`;
      if (num <= 3)
        return `<span class="inline-block px-2 py-0.5 rounded text-xs font-semibold bg-red-900 text-red-300 animate-pulse">剩 ${num} 席</span>`;
      if (num <= 9)
        return `<span class="inline-block px-2 py-0.5 rounded text-xs font-semibold bg-yellow-900 text-yellow-300">剩 ${num} 席</span>`;
      return `<span class="inline-block px-2 py-0.5 rounded text-xs font-semibold bg-green-900 text-green-300">剩 ${num} 席</span>`;
    }

    function statCell(label, value, accent) {
      const cls = accent ? 'text-cyan-400 font-bold' : 'text-white font-semibold';
      return `<div class="flex flex-col items-center">
        <span class="text-gray-500 text-xs mb-0.5">${label}</span>
        <span class="${cls} text-sm">${value ?? '—'}</span>
      </div>`;
    }

    function renderCards(rows) {
      const grid = document.getElementById('grid');
      if (!rows.length) { grid.innerHTML = renderState('empty'); return; }
      grid.innerHTML = rows.map(r => {
        const dep   = r['a'] || '—';
        const ret   = r['b'] || '—';
        const total = r['c'] || '—';
        const alloc = r['d'] || '—';
        const booked= r['e'] || '—';
        const group = r['f'] || '—';
        const remain= r['g'];
        return `
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 flex flex-col gap-3 hover:border-cyan-800 transition-colors">
            <div class="flex items-center justify-between">
              <span class="text-cyan-500">✈</span>
              ${seatBadge(remain)}
            </div>
            <div class="flex items-center gap-3">
              <div class="flex flex-col">
                <span class="text-xs text-gray-500 tracking-wider">出發</span>
                <span class="font-bold text-white">${dep}</span>
              </div>
              <span class="text-gray-600">→</span>
              <div class="flex flex-col">
                <span class="text-xs text-gray-500 tracking-wider">回程</span>
                <span class="font-bold text-white">${ret}</span>
              </div>
            </div>
            <div class="border-t border-gray-800 pt-3 grid grid-cols-4 gap-1 text-center">
              ${statCell('總機位', total)}
              ${statCell('旅行社', alloc)}
              ${statCell('下訂', booked)}
              ${statCell('對團', group)}
            </div>
          </div>`;
      }).join('');
    }

    function renderState(type) {
      if (type === 'loading') {
        return Array.from({ length: 8 }, () => `
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 flex flex-col gap-3 animate-pulse">
            <div class="h-4 bg-gray-800 rounded w-1/3"></div>
            <div class="h-6 bg-gray-800 rounded w-2/3"></div>
            <div class="h-4 bg-gray-800 rounded w-1/2"></div>
          </div>`).join('');
      }
      if (type === 'empty') {
        return `<div class="col-span-full text-center py-20 text-gray-600">
          <p class="text-4xl mb-3">✈</p>
          <p class="text-sm">目前無資料</p>
        </div>`;
      }
      return `<div class="col-span-full text-center py-20 text-gray-600">
        <p class="text-4xl mb-3">⚠</p>
        <p class="text-sm text-red-400">資料載入失敗，請確認 URL 是否正確</p>
      </div>`;
    }

    function fetchSheet(url) {
      return new Promise((resolve, reject) => {
        Papa.parse(url, {
          download: true,
          header: true,
          skipEmptyLines: true,
          complete: r => resolve(r.data),
          error: reject,
        });
      });
    }

    async function switchTab(dest) {
      currentTab = dest;

      document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
      document.getElementById(`tab-${dest}`).classList.add('tab-active');

      const grid = document.getElementById('grid');
      grid.innerHTML = renderState('loading');

      const url = config[dest].url;
      if (!url) {
        grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-600">
          <p class="text-4xl mb-3">📋</p>
          <p class="text-sm text-yellow-500">${dest} 的 URL 尚未設定，請填入 config 物件</p>
        </div>`;
        document.getElementById('last-updated').textContent = '—';
        return;
      }

      try {
        const rows = await fetchSheet(url);
        renderCards(rows);
        document.getElementById('last-updated').textContent =
          `更新於 ${new Date().toLocaleTimeString('zh-TW')}`;
      } catch {
        grid.innerHTML = renderState('error');
      }
    }

    switchTab('BKK');
  </script>
</body>
</html>
