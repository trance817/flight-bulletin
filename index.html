<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>機票布告欄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0e1a;
      --surface:  #111827;
      --border:   #1f2937;
      --text:     #e2e8f0;
      --muted:    #6b7280;
      --cyan:     #22d3ee;
    }

    body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ── Header ── */
    header { border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 15px; font-weight: 700; letter-spacing: 3px; color: var(--cyan); }
    header p  { font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }

    /* ── Tabs ── */
    nav { display: flex; border-bottom: 1px solid var(--border); padding: 0 24px; }
    .tab { padding: 12px 20px; font-size: 13px; font-weight: 500; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: color .2s, border-color .2s; white-space: nowrap; }
    .tab:hover { color: #93c5fd; }
    .tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .tab .dest-label { font-size: 11px; color: #374151; margin-left: 4px; }

    /* ── Filters ── */
    #filter-bar { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
    .filter-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .filter-label { font-size: 11px; color: var(--muted); min-width: 28px; letter-spacing: 1px; }
    .fbtn {
      padding: 5px 14px; font-size: 13px; border-radius: 20px;
      border: 1px solid #374151; background: transparent; color: var(--muted);
      cursor: pointer; transition: border-color .15s, color .15s, background .15s;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .fbtn:hover { border-color: var(--cyan); color: #93c5fd; }
    .fbtn.active { background: var(--cyan); border-color: var(--cyan); color: #0a0e1a; font-weight: 700; }

    /* ── Grid ── */
    main { padding: 24px; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px 18px;
      border-top: 2px solid transparent;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,0,0,.45); }
    .card.st-none { border-top-color: #4b5563; }
    .card.st-over { border-top-color: #f59e0b; }
    .card.st-ok   { border-top-color: #22c55e; }

    /* pill */
    .pill { font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 999px; }
    .pill.st-none { background: #1f2937; color: #9ca3af; }
    .pill.st-over { background: #451a03; color: #f59e0b; }
    .pill.st-ok   { background: #052e16; color: #22c55e; }

    /* dates row */
    .dates { display: flex; align-items: center; gap: 10px; }
    .date-block .lbl { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .date-block .val { font-size: 22px; font-weight: 700; letter-spacing: 1px; color: #f1f5f9; }
    .date-block .wkd { font-size: 11px; color: #60a5fa; margin-top: 2px; }
    .arrow-block { display: flex; flex-direction: column; align-items: center; color: #374151; font-size: 11px; gap: 1px; flex-shrink: 0; }
    .dur-badge { font-size: 15px; background: #1e3a5f; color: #60a5fa; padding: 3px 10px; border-radius: 6px; font-weight: 700; }

    /* remain */
    .remain-block { margin-left: auto; text-align: right; flex-shrink: 0; }
    .remain-block .lbl { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .remain-num { font-size: 48px; font-weight: 700; line-height: 1; }
    .remain-num.r0   { color: #4b5563; }
    .remain-num.rlow { color: #ef4444; animation: blink 1.2s ease-in-out infinite; }
    .remain-num.rmid { color: #f59e0b; }
    .remain-num.rok  { color: #22c55e; }

    /* flight schedule */
    .flight-schedule { border-top: 1px solid var(--border); padding-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .flight-row { display: flex; flex-direction: column; gap: 2px; }
    .flight-row + .flight-row { border-top: 1px dashed #1f2937; padding-top: 6px; }
    .flight-line { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .fnum { color: #60a5fa; font-weight: 700; min-width: 44px; }
    .fport { color: #94a3b8; font-weight: 600; }
    .ftime { color: #f1f5f9; font-weight: 600; }
    .farrow { color: #374151; font-size: 13px; }

    /* tags */
    .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: 12px; border: 1px solid; }
    .tag.t-none  { background: rgba(107,114,128,.12); border-color: #374151; color: #9ca3af; }
    .tag.t-over  { background: rgba(245,158,11,.12);  border-color: #92400e; color: #f59e0b; animation: blink 1.2s ease-in-out infinite; }
    .tag.t-ok    { background: rgba(34,197,94,.12);   border-color: #166534; color: #4ade80; }
    .tag.t-group { background: rgba(34,211,238,.12);  border-color: #155e75; color: var(--cyan); }


    /* skeleton */
    .skeleton { background: linear-gradient(90deg, #1f2937 25%, #273549 50%, #1f2937 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
  </style>
</head>
<body>

  <header>
    <span style="font-size:22px;">✈</span>
    <div>
      <h1 class="mono" style="font-size:26px;">機票布告欄</h1>
      <p>FLIGHT BULLETIN BOARD</p>
    </div>
    <div style="margin-left:auto; text-align:right;">
      <span id="last-updated" style="font-size:11px; color:var(--muted);">—</span>
    </div>
  </header>

  <nav>
    <button class="tab mono" id="tab-BKK" onclick="switchTab('BKK')">BKK<span class="dest-label">曼谷</span></button>
    <button class="tab mono" id="tab-CTS" onclick="switchTab('CTS')">CTS<span class="dest-label">札幌</span></button>
    <button class="tab mono" id="tab-KIX" onclick="switchTab('KIX')">KIX<span class="dest-label">大阪</span></button>
    <button class="tab mono" id="tab-OKA" onclick="switchTab('OKA')">OKA<span class="dest-label">沖繩</span></button>
  </nav>

  <div id="filter-bar">
    <div class="filter-row">
      <span class="filter-label">狀態</span>
      <div id="fs">
        <button class="fbtn active" data-val="all">全部</button>
        <button class="fbtn" data-val="available">🟢 尚有空位</button>
        <button class="fbtn" data-val="group">🎫 可湊團票</button>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">天數</span>
      <div id="fd"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">月份</span>
      <div id="fm"></div>
    </div>
  </div>

  <main><div id="grid"></div></main>

  <script>
    // ────────────────────────────────────────────
    // ★ Google Sheets CSV 網址
    // ────────────────────────────────────────────
    const config = {
      BKK: { label: '曼谷', url: 'https://docs.google.com/spreadsheets/d/1Czt87CXX6o2YGodh2u8UiyrqXaGipLYXcLA1XhjgASw/gviz/tq?tqx=out:csv&gid=714534551' },
      CTS: { label: '札幌', url: 'https://docs.google.com/spreadsheets/d/1Czt87CXX6o2YGodh2u8UiyrqXaGipLYXcLA1XhjgASw/gviz/tq?tqx=out:csv&gid=380962829' },
      KIX: { label: '大阪', url: 'https://docs.google.com/spreadsheets/d/1Czt87CXX6o2YGodh2u8UiyrqXaGipLYXcLA1XhjgASw/gviz/tq?tqx=out:csv&gid=1125156812' },
      OKA: { label: '沖繩', url: 'https://docs.google.com/spreadsheets/d/1Czt87CXX6o2YGodh2u8UiyrqXaGipLYXcLA1XhjgASw/gviz/tq?tqx=out:csv&gid=1456748343' },
    };
    // ────────────────────────────────────────────

    const WKDAY = ['日','一','二','三','四','五','六'];

    // BKK: 動態依 h 欄位（航班搭配碼）決定班次
    const BKK_FLIGHTS = {
      '567+570': { out: ['VZ567','TPE','15:25','BKK','18:15'], ret: ['VZ570','BKK','20:00','TPE','00:50(+1)'] },
      '569+566': { out: ['VZ569','TPE','19:45','BKK','22:45'], ret: ['VZ566','BKK','01:45','TPE','06:35'] },
      '571+570': { out: ['VZ571','TPE','13:25','BKK','16:10'], ret: ['VZ570','BKK','20:00','TPE','00:50(+1)'] },
      '569+570': { out: ['VZ569','TPE','19:45','BKK','22:45'], ret: ['VZ570','BKK','20:00','TPE','00:50(+1)'] },
    };

    // CTS / KIX / OKA: 固定班次
    const SCHEDULES = {
      KIX: [
        { out: ['VZ567','TPE','07:25','KIX','11:05'], ret: ['VZ567','KIX','12:25','TPE','14:25'] },
        { out: ['VZ566','TPE','08:05','KIX','11:45'], ret: ['VZ567','KIX','12:30','TPE','14:30'] },
      ],
      OKA: [
        { out: ['VZ568','TPE','14:45','OKA','17:05'], ret: ['VZ569','OKA','18:05','TPE','18:45'] },
      ],
      CTS: [
        { out: ['VZ570','TPE','02:50','CTS','07:35'], ret: ['VZ571','CTS','09:00','TPE','12:25'] },
      ],
    };

    function flightLine([num, dep, depT, arr, arrT]) {
      return `<div class="flight-line mono">
        <span class="fnum">${num}</span>
        <span class="fport">${dep}</span>
        <span class="ftime">${depT}</span>
        <span class="farrow">✈</span>
        <span class="fport">${arr}</span>
        <span class="ftime">${arrT}</span>
      </div>`;
    }

    // KIX: 一/五/日 → VZ567 07:25；二/三/四/六 → VZ566 08:05
    const KIX_FLIGHTS = {
      early: { out: ['VZ567','TPE','07:25','KIX','11:05'], ret: ['VZ567','KIX','12:25','TPE','14:25'] },
      late:  { out: ['VZ566','TPE','08:05','KIX','11:45'], ret: ['VZ567','KIX','12:30','TPE','14:30'] },
    };

    function flightScheduleHTML(dest, h, depDateStr) {
      let rows = [];
      if (dest === 'BKK') {
        const key = (h || '').trim().toLowerCase().replace(/\s/g, '');
        const match = BKK_FLIGHTS[key];
        if (match) rows = [match];
      } else if (dest === 'KIX') {
        const d = parseDate(depDateStr);
        const dow = d ? d.getDay() : -1; // 0=日,1=一,...,6=六
        const slot = [0, 1, 5].includes(dow) ? 'early' : 'late';
        rows = [KIX_FLIGHTS[slot]];
      } else {
        rows = SCHEDULES[dest] || [];
      }
      if (!rows.length) return '';
      const html = rows.map(({ out, ret }) =>
        `<div class="flight-row">${flightLine(out)}${flightLine(ret)}</div>`
      ).join('');
      return `<div class="flight-schedule">${html}</div>`;
    }

    function parseDate(s) {
      if (!s) return null;
      const m = String(s).replace(/"/g,'').trim().match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
      return m ? new Date(+m[1], +m[2]-1, +m[3]) : null;
    }

    function fmtDate(s) {
      const d = parseDate(s);
      return d ? `${d.getMonth()+1}/${d.getDate()}` : '—';
    }

    function duration(a, b) {
      const d1 = parseDate(a), d2 = parseDate(b);
      if (!d1 || !d2) return '';
      return `${Math.round((d2-d1)/86400000)+1}D`;
    }

    function weekday(a) {
      const d = parseDate(a);
      return d ? `週${WKDAY[d.getDay()]}` : '';
    }

    function getStatus(c, d, g) {
      const rem = parseInt(g,10), tot = parseInt(c,10), alc = parseInt(d,10);
      if (isNaN(rem) || rem <= 0) return 'none';
      if (!isNaN(alc) && !isNaN(tot) && alc > tot) return 'over';
      return 'ok';
    }

    function remainClass(g) {
      const n = parseInt(g,10);
      if (isNaN(n)||n<=0) return 'r0';
      if (n<=3) return 'rlow';
      if (n<=9) return 'rmid';
      return 'rok';
    }

    // ── Filter state ──
    const filterState = { status: 'all', month: 'all', dur: 'all' };

    function bindFilterGroup(containerId, key) {
      document.querySelectorAll(`#${containerId} .fbtn`).forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll(`#${containerId} .fbtn`).forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          filterState[key] = btn.dataset.val;
          applyFilters();
        });
      });
    }

    function rowDur(r) {
      // Prefer explicit duration from column i (G[N] in Excel), fallback to computed
      const explicit = (r['i'] || '').trim().toUpperCase();
      return explicit || duration(r['a'], r['b']);
    }

    function buildMonthButtons(rows) {
      const availRows = rows.filter(r => getStatus(r['c'], r['d'], r['g']) !== 'none');
      const months = [...new Set(availRows.map(r => {
        const d = parseDate(r['a']);
        return d ? String(d.getMonth() + 1) : null;
      }).filter(Boolean))].sort((a, b) => parseInt(a) - parseInt(b));
      const fm = document.getElementById('fm');
      filterState.month = 'all';
      fm.innerHTML = `<button class="fbtn active" data-val="all">全部</button>` +
        months.map(m => `<button class="fbtn" data-val="${m}">${m}月</button>`).join('');
      bindFilterGroup('fm', 'month');
    }

    function buildDurButtons(rows) {
      // 只從有空位的航班建立天數按鈕
      const availRows = rows.filter(r => getStatus(r['c'], r['d'], r['g']) !== 'none');
      const dataDurs = [...new Set(availRows.map(r => rowDur(r)).filter(Boolean))];
      const durs = [...new Set([...dataDurs])].sort((a, b) => parseInt(a) - parseInt(b));
      const fd = document.getElementById('fd');
      filterState.dur = 'all';
      fd.innerHTML = `<button class="fbtn active" data-val="all">全部</button>` +
        durs.map(d => `<button class="fbtn" data-val="${d}">${d}</button>`).join('');
      bindFilterGroup('fd', 'dur');
    }

    function resetFilters() {
      ['fs','fm','fd'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.querySelectorAll('.fbtn').forEach((b, i) => b.classList.toggle('active', i === 0));
      });
      filterState.status = 'all'; filterState.month = 'all'; filterState.dur = 'all';
    }

    function applyFilters() {
      document.querySelectorAll('#grid .card[data-status]').forEach(card => {
        const { status: sf, month: mf, dur: df } = filterState;
        const s = card.dataset.status, m = card.dataset.month, d = card.dataset.dur, grp = card.dataset.group === '1';
        let show = true;
        if (sf === 'available' && s === 'none') show = false;
        else if (sf === 'group' && !grp) show = false;
        if (mf !== 'all' && m !== mf) show = false;
        if (df !== 'all' && d !== df) show = false;
        card.style.display = show ? '' : 'none';
      });
    }

    bindFilterGroup('fs', 'status');

    let _dest = 'BKK';
    function renderCard(r) {
      const dest = _dest;
      const [c,d,e,f,g] = ['c','d','e','f','g'].map(k => r[k]);
      const status = getStatus(c, d, g);
      const remain = parseInt(g, 10);
      const booked = parseInt(e, 10);
      const dep = r['a'], ret = r['b'];

      if (status === 'none') return '';   // 已售完不顯示卡片
      const pillLabel = { over:'超放', ok:'有位' }[status];
      const dur = rowDur(r);
      const remainVal = isNaN(remain) ? '—' : remain;
      const depDate = parseDate(dep);
      const monthNum = depDate ? String(depDate.getMonth() + 1) : '';
      const canGroup = !isNaN(booked) && booked > 10 && !isNaN(remain) && remain > 0;

      const tags = [];
      if (status === 'none') tags.push(`<span class="tag t-none">🚫 無機位空間</span>`);
      else if (status === 'over') tags.push(`<span class="tag t-over">⚠️ 超放，需清位</span>`);
      else tags.push(`<span class="tag t-ok">✅ 無超放</span>`);
      if (canGroup) tags.push(`<span class="tag t-group">🎟 可湊團票</span>`);

      return `
        <div class="card st-${status}" data-status="${status}" data-month="${monthNum}" data-dur="${dur}" data-group="${canGroup?1:0}">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span class="pill mono st-${status}">${pillLabel}</span>
            <span class="mono" style="font-size:12px;color:var(--muted);">${weekday(dep)}</span>
          </div>

          <div class="dates">
            <div class="date-block">
              <div class="lbl">出發</div>
              <div class="val mono">${fmtDate(dep)}</div>
              <div class="wkd mono">${weekday(dep)}</div>
            </div>
            <div class="arrow-block">
              ${dur ? `<span class="dur-badge mono">${dur}</span>` : ''}
              <span style="margin-top:2px;font-size:14px;color:#374151;">→</span>
            </div>
            <div class="date-block">
              <div class="lbl">回程</div>
              <div class="val mono">${fmtDate(ret)}</div>
              <div class="wkd mono">${weekday(ret)}</div>
            </div>
            <div class="remain-block">
              <div class="lbl">剩餘空位</div>
              <div class="remain-num mono ${remainClass(g)}">${remainVal}</div>
            </div>
          </div>

          <div class="tags">${tags.join('')}</div>

          ${flightScheduleHTML(dest, r['h'], dep)}
        </div>`;
    }

    function skeletonCard() {
      return `<div class="card st-ok" style="gap:14px;">
        <div class="skeleton" style="height:14px;width:35%;"></div>
        <div class="skeleton" style="height:26px;width:65%;"></div>
        <div class="skeleton" style="height:14px;width:50%;"></div>
        <div class="skeleton" style="height:12px;width:80%;"></div>
      </div>`;
    }

    function renderState(type) {
      if (type === 'loading') return Array.from({length:8}, skeletonCard).join('');
      const icon = type === 'empty' ? '✈' : '⚠';
      const msg  = type === 'empty' ? '目前無資料' : '資料載入失敗，請確認 URL 是否正確';
      const col  = type === 'empty' ? 'var(--muted)' : '#ef4444';
      return `<div style="grid-column:1/-1;text-align:center;padding:80px 0;">
        <div style="font-size:36px;margin-bottom:12px;">${icon}</div>
        <div style="font-size:14px;color:${col};">${msg}</div>
      </div>`;
    }

    function fetchSheet(url) {
      return new Promise((resolve, reject) =>
        Papa.parse(url, { download:true, header:true, skipEmptyLines:true, complete:r=>resolve(r.data), error:reject })
      );
    }

    async function switchTab(dest) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(`tab-${dest}`).classList.add('active');

      const grid = document.getElementById('grid');
      grid.innerHTML = renderState('loading');

      const url = config[dest]?.url;
      if (!url) {
        grid.innerHTML = renderState('empty');
        return;
      }

      try {
        const rows = await fetchSheet(url);
        _dest = dest;
        resetFilters();
        buildDurButtons(rows);
        buildMonthButtons(rows);
        const html = rows.map(renderCard).join('');
        grid.innerHTML = html || renderState('empty');
        document.getElementById('last-updated').textContent = `更新於 ${new Date().toLocaleTimeString('zh-TW')}`;
      } catch {
        grid.innerHTML = renderState('error');
      }
    }

    switchTab('BKK');
  </script>
</body>
</html>
